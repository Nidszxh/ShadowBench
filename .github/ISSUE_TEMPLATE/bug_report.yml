name: Bug report
description: Report something that isn't working
labels: ["bug"]
body:
  - type: textarea
    id: what-happened
    attributes:
      label: What happened?
      description: A clear description of the bug and what you expected instead.
    validations:
      required: true
  - type: textarea
    id: repro
    attributes:
      label: Steps to reproduce
      placeholder: |
        1. Run `shadowbench ...`
        2. ...
    validations:
      required: true
  - type: input
    id: version
    attributes:
      label: ShadowBench version
      placeholder: "v0.1.0 or commit sha"
    validations:
      required: true
  - type: dropdown
    id: os
    attributes:
      label: Operating system
      options: [Windows, macOS, Linux]
    validations:
      required: true
  - type: textarea
    id: hardware
    attributes:
      label: Hardware
      description: GPU model, VRAM, system RAM. Paste `shadowbench profile` output if you can.
