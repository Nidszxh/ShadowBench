name: Feature request
description: Suggest an idea or improvement
labels: ["enhancement"]
body:
  - type: textarea
    id: problem
    attributes:
      label: Problem
      description: What problem would this solve? Who is affected?
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: Proposed solution
  - type: dropdown
    id: module
    attributes:
      label: Which module?
      options: [Profiler, Predictor, Shadow Pool, Desktop UI, Docs/Other]
