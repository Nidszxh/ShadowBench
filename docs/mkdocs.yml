site_name: ShadowBench
site_description: Crowd-sourced, peer-to-peer benchmarking and local inference pooling for open-source AI models.
repo_url: https://github.com/Nidszxh/ShadowBench
docs_dir: .
site_dir: ../site

theme:
  name: material
  palette:
    - scheme: default
      primary: indigo
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
    - scheme: slate
      primary: indigo
      toggle:
        icon: material/brightness-4
        name: Switch to light mode
  features:
    - navigation.sections
    - content.code.copy

nav:
  - Home: index.md
  - Architecture: plan/ARCHITECTURE.md
  - Dataflow & Math: plan/DATAFLOW.md
  - Project Structure: ../PROJECT_STRUCTURE.md
  - Roadmap: plan/ROADMAP.md
  - Milestones: plan/MILESTONES.md
  - Implementation Plan: plan/IMPLEMENTATION_PLAN.md

markdown_extensions:
  - admonition
  - pymdownx.superfences
  - tables
