site_name: ShadowBench
site_description: Crowd-sourced, peer-to-peer benchmarking and local inference pooling for open-source AI models.
repo_url: https://github.com/OWNER/ShadowBench
docs_dir: docs

theme:
  name: material
  palette:
    - scheme: default
      primary: indigo
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
    - scheme: slate
      primary: indigo
      toggle:
        icon: material/brightness-4
        name: Switch to light mode
  features:
    - navigation.sections
    - content.code.copy

nav:
  - Home: index.md
  - Architecture: architecture.md
  - Dataflow & Math: dataflow.md
  - Project Structure: structure.md
  - Milestones: milestones.md

markdown_extensions:
  - admonition
  - pymdownx.superfences
  - tables
