name: Hardware / accuracy report
description: Share a real benchmark to improve prediction accuracy
labels: ["accuracy", "hardware"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for improving ShadowBench's predictions! The best way to contribute data is a PR that appends
        to `datasets/golden.jsonl` via `shadowbench bench --contribute`. Use this issue if you can't open a PR.
  - type: textarea
    id: profile
    attributes:
      label: Hardware profile
      description: Output of `shadowbench profile`.
      render: json
    validations:
      required: true
  - type: input
    id: model
    attributes:
      label: Model + quantization
      placeholder: "Qwen/Qwen3.5-35B-A3B-GGUF, Q4_K_M"
    validations:
      required: true
  - type: input
    id: predicted
    attributes:
      label: Predicted tokens/sec
  - type: input
    id: actual
    attributes:
      label: Measured tokens/sec
    validations:
      required: true
